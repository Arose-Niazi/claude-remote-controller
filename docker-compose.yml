services:
  crc-server:
    build: .
    container_name: crc-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    env_file: .env
    volumes:
      - /opt/crc-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
